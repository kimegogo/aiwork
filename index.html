<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt 智能寶庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* 設計變數：支援淺色與深色主題 */
:root {
  --bg: #f3f4f6;
  --surface: #ffffff;
  --surface-2: #f9fafb;
  --border: rgba(0, 0, 0, 0.08);
  --focus: #3b82f6;
  --t1: #111827;
  --t2: #4b5563;
  --t3: #9ca3af;
  --blue: #2563eb;
  --blue-d: #1d4ed8;
  --green: #10b981;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --s1: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --s2: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
  --ease: 0.25s cubic-bezier(.4, 0, .2, 1);
}

/* 深色模式變數 */
[data-theme="dark"] {
  --bg: #0b0f19;
  --surface: #151b2c;
  --surface-2: #1e2640;
  --border: rgba(255, 255, 255, 0.08);
  --focus: #60a5fa;
  --t1: #f9fafb;
  --t2: #d1d5db;
  --t3: #6b7280;
  --blue: #60a5fa;
  --blue-d: #3b82f6;
}

/* 提示詞卡片配色調色盤 */
.p0{--cb:#f3f0ff;--ct:#4c1d95;--cm:#7c3aed;--cs:#f5f3ff;--ck:#4c1d95}
.p1{--cb:#ecfdf5;--ct:#064e3b;--cm:#059669;--cs:#f0fdf4;--ck:#064e3b}
.p2{--cb:#eff6ff;--ct:#1e3a8a;--cm:#2563eb;--cs:#f0f7ff;--ck:#1e3a8a}
.p3{--cb:#fff7ed;--ct:#7c2d12;--cm:#ea580c;--cs:#fffaf5;--ck:#7c2d12}
.p4{--cb:#fdf2f8;--ct:#831843;--cm:#db2777;--cs:#fdf4f9;--ck:#831843}
.p5{--cb:#fefce8;--ct:#713f12;--cm:#ca8a04;--cs:#fefdf0;--ck:#713f12}
.p6{--cb:#fff1f2;--ct:#881337;--cm:#e11d48;--cs:#fff5f6;--ck:#881337}
.p7{--cb:#ecfeff;--ct:#164e63;--cm:#0891b2;--cs:#f0fdfa;--ck:#164e63}
.p8{--cb:#f7fee7;--ct:#365314;--cm:#65a30d;--cs:#f9fef0;--ck:#365314}
.p9{--cb:#faf5ff;--ct:#581c87;--cm:#a21caf;--cs:#fdf4ff;--ck:#581c87}
.p10{--cb:#fff0f0;--ct:#7f1d1d;--cm:#dc2626;--cs:#fff5f5;--ck:#7f1d1d}
.p11{--cb:#eef2ff;--ct:#312e81;--cm:#4f46e5;--cs:#f5f7ff;--ck:#312e81}

body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.6;transition:background var(--ease), color var(--ease);overflow-x:hidden}

/* 頂部快捷列 */
.topbar{position:absolute;right:1.5rem;top:1rem;z-index:100}
.action-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;transition:all var(--ease);box-shadow:var(--s1)}
.action-btn:hover{background:var(--surface-2);color:var(--t1);border-color:var(--t3)}
.action-btn svg{width:18px;height:18px}

/* 整合式英雄宣傳區 (置中排版) */
.hero{text-align:center;padding:3rem 1.5rem 2rem;background: radial-gradient(circle at top, rgba(59,130,246,0.05), transparent 60%);display:flex;flex-direction:column;align-items:center;gap:0.6rem}
.hero h1{font-size:clamp(1.8rem,5vw,2.5rem);font-weight:700;letter-spacing:-.02em;color:var(--t1);display:flex;align-items:center;justify-content:center;gap:10px}
.sheet-link{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--t2);text-decoration:none;padding:6px 12px;border-radius:var(--r-sm);transition:all var(--ease);font-weight:500;border:1px solid transparent}
.sheet-link:hover{color:var(--blue);border-color:var(--border);background:var(--surface)}
.sheet-link svg{width:15px;height:15px}

/* 搜尋框區塊 (置中) */
.search-container{width:100%;max-width:520px;margin:1rem auto 1.5rem;position:relative;padding:0 1rem}
.search-bar{position:relative;width:100%}
.search-bar svg.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--t3);pointer-events:none}
#searchInput{width:100%;height:46px;padding:0 40px 0 46px;border:1px solid var(--border);border-radius:var(--r-xl);background:var(--surface);font-size:.95rem;font-family:inherit;color:var(--t1);outline:none;transition:all var(--ease);box-shadow:var(--s1)}
#searchInput:focus{border-color:var(--focus);box-shadow:0 0 0 4px rgba(59,130,246,.18)}
#searchInput::placeholder{color:var(--t3)}

/* 搜尋清除按鈕 */
.clear-search {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--t3);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 4px;
  border-radius: 50%;
  transition: background var(--ease), color var(--ease);
}
.clear-search:hover {
  background: var(--border);
  color: var(--t1);
}

/* 篩選標籤 (置中排列) */
.filter-section{max-width:1280px;margin:0 auto;padding:0 1.5rem 2rem}
.filter-scroll{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.pill{cursor:pointer;padding:.45rem 1.2rem;border-radius:var(--r-xl);font-size:.85rem;font-weight:500;font-family:inherit;background:var(--surface);color:var(--t2);border:1px solid var(--border);transition:all var(--ease);white-space:nowrap;user-select:none;box-shadow: 0 1px 2px rgba(0,0,0,0.02)}
.pill:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px)}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow: 0 4px 12px rgba(37,99,235,0.2)}

/* 版面結構 */
.layout{max-width:1280px;margin:0 auto;padding:0 1.5rem 5rem}
.section{margin-bottom:3.5rem;animation: fadeUp 0.4s ease both}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.section-head h2{font-size:1.25rem;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--t1)}
.section-count{font-size:.75rem;font-weight:700;color:var(--t3);background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:2px 10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

/* 卡片設計 - 白底 + 頂部配條 */
.card{
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--s1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: box-shadow var(--ease), transform var(--ease), border-color var(--ease);
  position: relative;
}
.card:hover{box-shadow:var(--s2);transform:translateY(-4px);border-color:var(--blue)}
.card-stripe{height:5px;background:var(--cm);width:100%}
.card-body{padding:1.25rem;flex:1;display:flex;flex-direction:column;gap:.7rem}

/* 分類標籤樣式 */
.card-tag{font-size:.72rem;font-weight:700;letter-spacing:.04em;padding:4px 12px;border-radius:999px;display:inline-block;width:fit-content;background:var(--cb);color:var(--ct);border: 1px solid rgba(0,0,0,0.02)}

/* 標題 */
.card-title{font-size:1.1rem;font-weight:700;color:var(--t1);line-height:1.4}

/* 核心：Prompt 內容完全顯示區塊（支援內部滾動與段落保留） */
.card-prompt-box{
  background: var(--cs);
  color: var(--ck);
  padding: 1.2rem;
  border-radius: var(--r-md);
  font-size: .88rem;
  line-height: 1.7;
  height: 260px; /* 固定高度保持卡片整齊美觀 */
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid rgba(0,0,0,0.03);
  transition: background var(--ease), color var(--ease);
}

/* 自訂精美滾動條 */
.card-prompt-box::-webkit-scrollbar {
  width: 5px;
}
.card-prompt-box::-webkit-scrollbar-track {
  background: transparent;
}
.card-prompt-box::-webkit-scrollbar-thumb {
  background-color: rgba(0, 0, 0, 0.12);
  border-radius: 99px;
}
.card-prompt-box::-webkit-scrollbar-thumb:hover {
  background-color: rgba(0, 0, 0, 0.25);
}

/* 複製 Prompt 置中滿寬按鈕 */
.card-footer{padding:0 1.25rem 1.25rem;background:transparent}
.btn-copy{width:100%;padding:.7rem;border-radius:var(--r-sm);background:var(--blue);color:#fff;font-size:.85rem;font-weight:600;font-family:inherit;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--ease);box-shadow: 0 2px 4px rgba(37,99,235,0.15)}
.btn-copy:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-copy:active{transform:translateY(1px)}
.btn-copy.done{background:var(--green);transform:none;box-shadow:none}

/* 深色模式調校 */
[data-theme="dark"] .card-prompt-box {
  background: rgba(255, 255, 255, 0.03);
  color: var(--t2);
  border-color: rgba(255, 255, 255, 0.05);
}
[data-theme="dark"] .card-prompt-box::-webkit-scrollbar-thumb {
  background-color: rgba(255, 255, 255, 0.15);
}
[data-theme="dark"] .card-prompt-box::-webkit-scrollbar-thumb:hover {
  background-color: rgba(255, 255, 255, 0.3);
}
[data-theme="dark"] .btn-copy {
  background: var(--blue);
  color: #0b0f19;
  font-weight: 700;
}
[data-theme="dark"] .btn-copy:hover {
  background: #93c5fd;
}

/* 提示通知 (Toast) */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(40px);background:#111827;color:#fff;font-size:.88rem;font-weight:500;padding:.7rem 1.6rem;border-radius:999px;pointer-events:none;opacity:0;transition:transform .3s cubic-bezier(.18, .89, .32, 1.28), opacity .2s;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.3)}
[data-theme="dark"] .toast{background:#f3f4f6;color:#111827}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* 狀態呈現 */
.state-box{text-align:center;padding:5rem 1rem;color:var(--t2)}
.state-box .icon{font-size:3rem;margin-bottom:1rem;filter:grayscale(0.2)}
.state-box strong{font-size:1.1rem;display:block;margin-bottom:0.5rem;color:var(--t1)}
.state-box p{font-size:.92rem}
.state-box small{font-size:.78rem;color:var(--t3);margin-top:0.75rem;display:block}
.spinner{width:40px;height:40px;border:3px solid rgba(59,130,246,.15);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}

footer{text-align:center;padding:2.5rem 1.5rem;font-size:.8rem;color:var(--t3);border-top:1px solid var(--border);background:var(--surface);transition:all var(--ease)}

/* 動畫設定 */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* 響應式優化 */
@media(max-width:768px){
  .hero{padding:2.5rem 1rem 1.5rem}
  .cards{grid-template-columns:1fr}
  .layout,.filter-section{padding-left:1rem;padding-right:1rem}
  .topbar {top: 0.5rem; right: 1rem;}
}
</style>
</head>
<body>

<!-- 頂部主題切換按鈕 -->
<div class="topbar">
  <button class="action-btn" id="themeToggleBtn" title="切換深淺模式" aria-label="切換深淺模式">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<!-- 英雄宣傳區 -->
<header class="hero">
  <h1>🚀 AI Prompt 智能寶庫</h1>
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1eCBWboc-U58IUu45wOuusZQ-4abA5v-gH8SjYTTnCZg/edit?usp=sharing" target="_blank" rel="noopener">
    📂 開啟原始資料 Google Sheet
  </a>
</header>

<!-- 置中搜尋框 -->
<div class="search-container">
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="搜尋提示詞...">
    <button class="clear-search" id="clearSearchBtn" aria-label="清除搜尋">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</div>

<!-- 分類 Pills -->
<div class="filter-section">
  <div class="filter-scroll" id="filterWrap">
    <button class="pill active" data-cat="全部">全部</button>
  </div>
</div>

<!-- 主要內容卡片區 -->
<main class="layout" id="main">
  <div class="state-box"><div class="spinner"></div><strong>正在載入資料...</strong><p>正在與 Google Sheet 進行即時同步，請稍候</p></div>
</main>

<!-- Toast 彈出通知 -->
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
  已複製提示詞到剪貼簿！
</div>

<footer><p>© AI Prompt 智能寶庫 · 由 Google Sheets 驅動 · 資料即時同步</p></footer>

<script>
// 設定 Google Sheet 串接來源資訊
const SHEET_ID='1eCBWboc-U58IUu45wOuusZQ-4abA5v-gH8SjYTTnCZg';
const GID='1480282197';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

let allData=[],catPal={},palIdx=0,activeFilter='全部',searchQ='';

// 深淺模式切換邏輯
const themeToggleBtn = document.getElementById('themeToggleBtn');
const sunIcon = themeToggleBtn.querySelector('.sun-icon');
const moonIcon = themeToggleBtn.querySelector('.moon-icon');

function initTheme() {
  let savedTheme = 'light';
  try {
    savedTheme = localStorage.getItem('theme');
  } catch (e) {}
  if (!savedTheme) {
    savedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  setTheme(savedTheme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try {
    localStorage.setItem('theme', theme);
  } catch (e) {}
  if (theme === 'dark') {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  }
}

themeToggleBtn.addEventListener('click', () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

// 高級 CSV 解析狀態機：完美解析多行、引號內含換行的複雜單元格
function parseCSV(text) {
  const lines = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (inQuotes) {
      if (char === '"') {
        if (nextChar === '"') {
          cell += '"';
          i++; // 跳過下一個引號
        } else {
          inQuotes = false;
        }
      } else {
        cell += char;
      }
    } else {
      if (char === '"') {
        inQuotes = true;
      } else if (char === ',') {
        row.push(cell.trim());
        cell = '';
      } else if (char === '\r' || char === '\n') {
        row.push(cell.trim());
        cell = '';
        lines.push(row);
        row = [];
        if (char === '\r' && nextChar === '\n') {
          i++;
        }
      } else {
        cell += char;
      }
    }
  }
  if (cell || row.length > 0) {
    row.push(cell.trim());
    lines.push(row);
  }

  if (lines.length < 2) return [];

  const headers = lines[0].map(h => h.trim().replace(/^"|"$/g, ''));
  const data = [];

  for (let i = 1; i < lines.length; i++) {
    const r = lines[i];
    if (r.length === 0 || (r.length === 1 && r[0] === '')) continue;
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = r[idx] !== undefined ? r[idx] : '';
    });
    data.push(obj);
  }
  return data;
}

// 欄位匹配提取器
function getField(row,...keys){
  for(const k of keys){
    if(row[k]!==undefined&&row[k]!=='')return row[k];
    const f=Object.keys(row).find(rk=>rk.toLowerCase()===k.toLowerCase());
    if(f&&row[f]!=='')return row[f];
  }
  return'';
}

const getType=r=>getField(r,'Type','type','類型','群組')||'其他';
const getCat=r=>getField(r,'Category','category','分類','類別','標籤','tag','Tag')||'其他';
const getTitle=r=>getField(r,'標題','title','Title','名稱','name','Name','主題');
const getPrompt=r=>getField(r,'內容','prompt','Prompt','提示詞','content','Content','說明','description','正文');

function palFor(type){if(catPal[type]===undefined)catPal[type]=palIdx++%12;return catPal[type];}

// 分類圖示對照
const EMOJI={'AI 協思':'🧠','AI 協助':'🤖','內容創作':'✍️','筆記精煉':'📝','筆記整理':'🗂️','程式應用':'💻','程式生成':'⚙️','簡報表達':'🎤','文本優化':'✨','生文校正':'📖','專案企劃':'📋','資訊整理':'📊','圖片生成':'🖼️','心智圖法':'🧠','其他':'💡'};
const emoji=c=>EMOJI[c]||'💡';
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardHTML(row){
  const type=getType(row),cat=getCat(row),title=getTitle(row),prompt=getPrompt(row);
  if(!title&&!prompt)return'';
  const p=palFor(type);
  return`<div class="card p${p}">
  <div class="card-stripe"></div>
  <div class="card-body">
    <span class="card-tag">${esc(cat)}</span>
    <div class="card-title">${esc(title)}</div>
    <!-- 內容容器：完全保留內文的所有段落，100% 呈現 -->
    <div class="card-prompt-box">${esc(prompt)}</div>
  </div>
  <div class="card-footer">
    <button class="btn-copy" data-prompt="${esc(prompt)}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span>複製 Prompt</span>
    </button>
  </div>
</div>`;
}

// 畫面繪製邏輯
function render(){
  const main=document.getElementById('main');
  const q=searchQ.toLowerCase();
  
  // 篩選出符合 Pill 類別 (Category) 與搜尋框 (Search Query) 的資料
  const filtered=allData.filter(row=>{
    const type=getType(row);
    const cat=getCat(row);
    const t=getTitle(row).toLowerCase();
    const b=getPrompt(row).toLowerCase();
    return(activeFilter==='全部'||cat===activeFilter)&&(!q||t.includes(q)||b.includes(q)||cat.toLowerCase().includes(q)||type.toLowerCase().includes(q));
  });
  
  if(!filtered.length){
    main.innerHTML=`<div class="state-box"><div class="icon">🔍</div><strong>找不到符合的提示詞</strong><p>試試其他關鍵字或變更分類篩選</p></div>`;
    return;
  }
  
  // 依據群組 (Type) 來做大分類分區
  const groups={};
  filtered.forEach(row=>{
    const t=getType(row);
    if(!groups[t])groups[t]=[];
    groups[t].push(row);
  });
  
  main.innerHTML=Object.entries(groups).map(([type,rows])=>`
<div class="section">
  <div class="section-head"><h2>${emoji(type)} ${esc(type)}</h2><span class="section-count">${rows.length}</span></div>
  <div class="cards">${rows.map(cardHTML).join('')}</div>
</div>`).join('');
  
  // 重新綁定複製事件
  document.querySelectorAll('.btn-copy').forEach(b=>b.addEventListener('click',()=>copyText(b.dataset.prompt,b)));
}

// 提升剪貼簿複製相容性 (預設 iframe 降級方案以完全支援 Sandbox 預覽環境)
function copyText(text,btn){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
  } catch (err) {
    console.error('複製失敗：', err);
  }
  document.body.removeChild(ta);
  
  if(btn){
    const originalContent = btn.innerHTML;
    btn.innerHTML='✓ 已複製！';
    btn.classList.add('done');
    setTimeout(()=>{
      btn.innerHTML=originalContent;
      btn.classList.remove('done');
    },2000);
  }
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// 搜尋輸入框邏輯
let st;
const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearchBtn');

searchInput.addEventListener('input',e=>{
  const val = e.target.value;
  clearSearchBtn.style.display = val ? 'flex' : 'none';
  clearTimeout(st);
  st=setTimeout(()=>{
    searchQ=val;
    render();
  },180);
});

clearSearchBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearSearchBtn.style.display = 'none';
  searchQ = '';
  searchInput.focus();
  render();
});

// 建立分類標籤過濾器 (從 Category 欄位提取)
function buildFilters(cats){
  const wrap=document.getElementById('filterWrap');
  if(!wrap) return;
  wrap.innerHTML='';
  ['全部',...cats].forEach(cat=>{
    const b=document.createElement('button');
    b.className='pill'+(cat===activeFilter?' active':'');
    b.dataset.cat=cat;b.textContent=cat;
    b.addEventListener('click',()=>{
      activeFilter=cat;
      document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===cat));
      render();
    });
    wrap.appendChild(b);
  });
}

// 載入 Google 試算表資料
async function loadData(){
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const text=await r.text();
    allData=parseCSV(text).filter(row=>getTitle(row)||getPrompt(row));
    const cats=[...new Set(allData.map(getCat))];
    
    // 安全地初始化調色盤配色與 Pills 按鈕
    allData.forEach(row=>palFor(getType(row)));
    buildFilters(cats);
    render();
  }catch(err){
    document.getElementById('main').innerHTML=`
<div class="state-box">
  <div class="icon">⚠️</div>
  <strong>無法載入資料</strong>
  <p>請確認您的 Google 試算表已開啟「知道連結的使用者可以檢視」共享權限</p>
  <small style="color:var(--t3); margin-top:8px">${err.message}</small><br><br>
  <button onclick="loadData()" style="padding:.6rem 1.5rem;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-size:.88rem;font-weight:600;box-shadow: 0 4px 12px rgba(59,130,246,0.2)">重新嘗試</button>
</div>`;
  }
}

// 初始化啟動
initTheme();
loadData();
</script>
